name: CI

on:
  push:
    branches: [main, dev, feature/*]
  pull_request:
    branches: [main, dev, feature/*]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify -pl sharding-core

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: sharding-core/target/surefire-reports/
